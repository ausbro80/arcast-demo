<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCAST</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Noto Sans KR',system-ui,sans-serif;
  background:#08061a;color:#e8e6ff;
  min-height:100vh;overflow-x:hidden
}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:rgba(8,6,26,0.92);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(120,80,255,0.15)
}
.logo{
  font-size:20px;font-weight:700;
  background:linear-gradient(135deg,#a78bff,#60efff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.nav-key{
  font-size:11px;color:rgba(167,139,255,0.6);cursor:pointer;
  border:1px solid rgba(167,139,255,0.2);border-radius:6px;padding:5px 10px;
  background:none
}

/* STAGE - 캐릭터 메인 화면 */
.stage{
  position:relative;
  background:linear-gradient(160deg,#0b0820,#110d2e,#08061a);
  height:55vh;min-height:320px;
  display:flex;align-items:flex-end;justify-content:center;
  overflow:hidden
}
.stage-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(120,80,255,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(120,80,255,0.05) 1px,transparent 1px);
  background-size:40px 40px;
  animation:gridMove 20s linear infinite
}
@keyframes gridMove{from{background-position:0 0}to{background-position:40px 40px}}

/* 제품 이미지 (왼쪽) */
.product-zone{
  position:absolute;left:8%;bottom:0;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  transform:translateY(100%);transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);
  z-index:2
}
.product-zone.show{transform:translateY(0)}
.product-img-wrap{
  width:120px;height:120px;
  background:rgba(30,12,60,0.8);
  border:1px solid rgba(167,139,255,0.25);
  border-radius:16px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px rgba(124,58,237,0.25)
}
.product-img-wrap img{width:100%;height:100%;object-fit:cover}
.product-emoji-big{font-size:52px;line-height:1}
.product-label{
  font-size:11px;color:rgba(167,139,255,0.7);
  background:rgba(8,6,26,0.8);border:1px solid rgba(167,139,255,0.15);
  border-radius:6px;padding:3px 8px;white-space:nowrap
}

/* 캐릭터 (오른쪽) */
.char-zone{
  position:relative;z-index:3;
  display:flex;flex-direction:column;align-items:center;
  margin-right:5%;
}
.char-img{
  height:min(52vh,300px);width:auto;
  object-fit:contain;
  filter:drop-shadow(0 8px 32px rgba(124,58,237,0.3));
  transition:opacity 0.25s ease;
  animation:charFloat 3s ease-in-out infinite
}
@keyframes charFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

/* 말풍선 */
.bubble{
  position:absolute;
  top:12px;right:calc(100% + 12px);
  min-width:160px;max-width:220px;
  background:rgba(18,8,46,0.96);
  border:1px solid rgba(167,139,255,0.35);
  border-radius:16px 16px 4px 16px;
  padding:12px 14px;
  box-shadow:0 4px 24px rgba(124,58,237,0.15);
  transform:scale(0);transform-origin:bottom right;
  transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
  z-index:10
}
.bubble.show{transform:scale(1)}
.bubble-text{font-size:13px;color:#d4caff;line-height:1.55}

/* AR 레이블 */
.ar-labels{
  position:absolute;top:14px;left:0;right:0;
  display:flex;justify-content:space-between;padding:0 14px;z-index:5
}
.ar-tag{
  display:flex;align-items:center;gap:5px;
  font-size:10px;color:rgba(167,139,255,0.7);
  background:rgba(8,6,26,0.75);
  border:1px solid rgba(167,139,255,0.15);
  border-radius:6px;padding:4px 8px
}
.ar-dot{width:5px;height:5px;border-radius:50%;background:#a78bff;animation:blink 1.5s infinite}
.ar-dot.cyan{background:#60efff}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* IDLE STATE */
.idle-hint{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:13px;color:rgba(232,230,255,0.25);text-align:center;
  transition:opacity 0.3s;white-space:nowrap
}
.idle-hint.gone{opacity:0;pointer-events:none}

/* 하단 패널 */
.panel{padding:20px 16px 32px;max-width:600px;margin:0 auto}

/* 입력 섹션 */
.input-section{margin-bottom:20px}
.section-label{
  font-size:11px;color:rgba(167,139,255,0.6);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:10px
}
.url-row{display:flex;gap:8px;margin-bottom:10px}
.url-input{
  flex:1;background:rgba(255,255,255,0.04);
  border:1px solid rgba(167,139,255,0.15);border-radius:10px;
  padding:11px 14px;font-size:14px;color:#e8e6ff;outline:none;font-family:inherit
}
.url-input:focus{border-color:rgba(167,139,255,0.4)}
.url-input::placeholder{color:rgba(232,230,255,0.2)}
.btn-analyze{
  background:linear-gradient(135deg,#7c3aed,#4f46e5);
  color:#fff;border:none;border-radius:10px;
  padding:11px 18px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap;
  transition:all 0.2s
}
.btn-analyze:disabled{opacity:0.5;cursor:not-allowed}
.btn-analyze:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 20px rgba(124,58,237,0.35)}

/* 구분선 */
.divider{
  display:flex;align-items:center;gap:12px;margin:12px 0;
  font-size:12px;color:rgba(232,230,255,0.2)
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;background:rgba(167,139,255,0.1)
}

/* 이미지 업로드 */
.upload-zone{
  border:1.5px dashed rgba(167,139,255,0.2);border-radius:12px;
  padding:16px;text-align:center;cursor:pointer;
  background:rgba(124,58,237,0.03);transition:all 0.2s
}
.upload-zone:hover{border-color:rgba(167,139,255,0.45);background:rgba(124,58,237,0.07)}
.upload-zone-text{font-size:13px;color:rgba(232,230,255,0.35)}

/* 제품 카드 */
.product-card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(167,139,255,0.12);
  border-radius:14px;padding:16px;margin-bottom:16px;
  display:none
}
.product-card.show{display:block}
.pc-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.pc-thumb{
  width:52px;height:52px;border-radius:10px;overflow:hidden;
  background:rgba(124,58,237,0.12);
  display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0
}
.pc-thumb img{width:100%;height:100%;object-fit:cover}
.pc-name{font-size:15px;font-weight:700;margin-bottom:2px}
.pc-cat{font-size:11px;color:#a78bff}
.pc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tag{
  background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);
  color:#c4b8ff;font-size:11px;padding:3px 8px;border-radius:100px
}
.pc-tagline{font-size:12px;color:rgba(232,230,255,0.4);font-style:italic}

/* 감정 버튼 */
.state-section{margin-bottom:16px;display:none}
.state-section.show{display:block}
.state-btns{display:flex;flex-wrap:wrap;gap:6px}
.state-btn{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(167,139,255,0.1);
  color:rgba(232,230,255,0.5);border-radius:8px;
  padding:8px 12px;font-size:13px;cursor:pointer;
  transition:all 0.15s;font-family:inherit
}
.state-btn:hover,.state-btn.on{
  background:rgba(124,58,237,0.15);
  border-color:rgba(167,139,255,0.35);color:#c4b8ff
}

/* 스크립트 목록 */
.script-section{display:none}
.script-section.show{display:block}
.script-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:10px
}
.script-title{font-size:11px;color:rgba(232,230,255,0.35);letter-spacing:0.5px;text-transform:uppercase}
.regen-btn{
  background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);
  color:#a78bff;font-size:12px;border-radius:6px;padding:4px 10px;
  cursor:pointer;font-family:inherit;transition:all 0.15s
}
.regen-btn:hover{background:rgba(124,58,237,0.2)}
.script-list{display:flex;flex-direction:column;gap:6px}
.script-item{
  background:rgba(15,10,35,0.5);
  border:1px solid rgba(167,139,255,0.07);
  border-radius:10px;padding:12px 14px;
  font-size:13px;color:rgba(232,230,255,0.6);
  line-height:1.5;cursor:pointer;transition:all 0.15s;
  display:flex;gap:10px;align-items:flex-start
}
.script-item:hover{
  background:rgba(124,58,237,0.07);
  border-color:rgba(167,139,255,0.2);color:#d4caff
}
.script-item.on{
  background:rgba(124,58,237,0.12);
  border-color:rgba(167,139,255,0.3);color:#e8e6ff
}
.si-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* 로딩 */
#loading{
  position:fixed;inset:0;z-index:9999;
  background:rgba(8,6,26,0.88);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:14px
}
#loading.on{display:flex}
.spin{
  width:40px;height:40px;
  border:3px solid rgba(167,139,255,0.15);
  border-top-color:#a78bff;border-radius:50%;
  animation:spin 0.8s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:14px;color:rgba(232,230,255,0.55)}

/* 토스트 */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(20,12,45,0.96);border:1px solid rgba(167,139,255,0.3);
  color:#d4caff;border-radius:12px;padding:10px 18px;
  font-size:13px;z-index:9998;white-space:nowrap;
  opacity:0;transition:opacity 0.3s;pointer-events:none
}
#toast.show{opacity:1}

/* API 키 모달 */
#keyModal{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,0.88);
  display:none;align-items:center;justify-content:center;padding:20px
}
#keyModal.on{display:flex}
.kcard{
  background:#12082e;border:1px solid rgba(167,139,255,0.25);
  border-radius:20px;padding:28px 24px;max-width:340px;width:100%
}
.kcard h3{font-size:16px;font-weight:700;color:#fff;margin-bottom:6px}
.kcard p{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:16px;line-height:1.6}
.key-input{
  width:100%;background:rgba(255,255,255,0.05);
  border:1px solid rgba(167,139,255,0.2);border-radius:10px;
  padding:11px 14px;font-size:13px;color:#fff;
  outline:none;font-family:inherit;margin-bottom:8px
}
.key-input::placeholder{color:rgba(255,255,255,0.2)}
.key-link{font-size:11px;color:#a78bff;margin-bottom:14px;display:block}
.btn-save-key{
  width:100%;background:linear-gradient(135deg,#7c3aed,#4f46e5);
  color:#fff;border:none;border-radius:10px;
  padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit
}
.btn-skip{
  width:100%;background:transparent;color:rgba(255,255,255,0.25);
  border:none;padding:10px;font-size:12px;cursor:pointer;font-family:inherit;margin-top:4px
}
</style>
</head>

let API_KEY = localStorage.getItem('arcast_key') || '';
let scripts = [], product = null, autoTimer = null;
let uploadedB64 = null;

// 말풍선 초기 표시
setTimeout(() => {
  document.getElementById('bubble').classList.add('show');
}, 500);

// API 키 없으면 자동으로 모달
if (!API_KEY) setTimeout(() => openKeyModal(), 800);

function openKeyModal() { document.getElementById('keyModal').classList.add('on'); }
function closeKeyModal() { document.getElementById('keyModal').classList.remove('on'); }
function saveKey() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k.startsWith('sk-ant')) { showToast('⚠️ sk-ant- 로 시작하는 키를 입력해주세요'); return; }
  API_KEY = k;
  localStorage.setItem('arcast_key', k);
  closeKeyModal();
  showToast('✅ API 키 저장됨!');
}

function setChar(state) {
  const img = document.getElementById('charImg');
  img.style.opacity = '0';
  setTimeout(() => { img.src = CHARS[state]; img.style.opacity = '1'; }, 220);
}

function setBubble(text) {
  const b = document.getElementById('bubble');
  const bt = document.getElementById('bubbleText');
  b.style.transform = 'scale(0)';
  setTimeout(() => {
    bt.innerHTML = text;
    b.classList.add('show');
    b.style.transform = '';
  }, 200);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function startAuto() {
  stopAuto();
  if (!scripts.length) return;
  const seq = ['idle','thinking','speak','happy','hum'];
  let i = 0;
  autoTimer = setInterval(() => {
    const st = seq[i++ % seq.length];
    const s = scripts.find(sc => sc.state === st);
    if (s) {
      setChar(st);
      setBubble(s.text);
      document.querySelectorAll('.state-btn').forEach(b => b.classList.toggle('on', b.dataset.s === st));
      document.querySelectorAll('.script-item').forEach(si => si.classList.toggle('on', si.dataset.s === st));
    }
  }, 3000);
}
function stopAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }

function clickState(state, el) {
  stopAuto();
  setChar(state);
  const s = scripts.find(sc => sc.state === state);
  if (s) setBubble(s.text);
  document.querySelectorAll('.state-btn').forEach(b => b.classList.toggle('on', b === el));
  document.querySelectorAll('.script-item').forEach(si => si.classList.toggle('on', si.dataset.s === state));
}

function clickScriptItem(state, el) {
  stopAuto();
  setChar(state);
  const s = scripts.find(sc => sc.state === state);
  if (s) setBubble(s.text);
  document.querySelectorAll('.state-btn').forEach(b => b.classList.toggle('on', b.dataset.s === state));
  document.querySelectorAll('.script-item').forEach(si => si.classList.toggle('on', si === el));
}

function handleImg(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    uploadedB64 = ev.target.result;
    analyzeWithData(null, uploadedB64);
  };
  reader.readAsDataURL(file);
}

// 드래그앤드롭
const uz = document.querySelector('.upload-zone');
uz.addEventListener('dragover', e => { e.preventDefault(); uz.style.borderColor='rgba(167,139,255,0.6)'; });
uz.addEventListener('dragleave', () => { uz.style.borderColor=''; });
uz.addEventListener('drop', e => {
  e.preventDefault(); uz.style.borderColor='';
  const file = e.dataTransfer.files[0];
  if (file?.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = ev => { uploadedB64 = ev.target.result; analyzeWithData(null, uploadedB64); };
    reader.readAsDataURL(file);
  }
});

function doAnalyze() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { showToast('URL을 입력해주세요'); return; }
  if (!API_KEY) { showToast('API 키를 먼저 설정해주세요'); openKeyModal(); return; }
  analyzeWithData(url, null);
}

async function analyzeWithData(url, imgB64) {
  if (!API_KEY) { openKeyModal(); return; }

  document.getElementById('loading').classList.add('on');
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('loadTxt').textContent = 'AI가 제품을 분석 중이에요...';
  setChar('thinking');
  setBubble('분석 중이에요... 🤔');

  const userContent = [];
  if (imgB64) {
    userContent.push({
      type:'image',
      source:{type:'base64',media_type:'image/png',data:imgB64.split(',')[1]}
    });
  }

  const urlPart = url ? `제품 URL: ${url}
` : '';
  userContent.push({
    type:'text',
    text:`${urlPart}${imgB64?'이 이미지의 제품을 분석해서':''} AR 캐릭터 마케팅 스크립트를 만들어주세요.

JSON만 응답 (다른 텍스트 없이):
{
  "productName": "제품명 15자이내",
  "category": "카테고리",
  "emoji": "이모지1개",
  "tags": ["특징1","특징2","특징3"],
  "tagline": "한줄소개 15자이내",
  "scripts": [
    {"state":"idle","text":"소개 멘트 25자이내 ✨"},
    {"state":"happy","text":"신나는 멘트 25자이내 🎉"},
    {"state":"speak","text":"설명 멘트 25자이내 💡"},
    {"state":"thinking","text":"생각 멘트 25자이내 🤔"},
    {"state":"hum","text":"궁금증 멘트 25자이내 💭"}
  ]
}`
  });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': API_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-allow-browser':'true'
      },
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:900,
        system:'AR 마케팅 전문가. 반드시 유효한 JSON만 응답. 다른 텍스트 없이.',
        messages:[{role:'user',content:userContent}]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const raw = data.content[0].text.replace(/```json|```/g,'').trim();
    applyProduct(JSON.parse(raw), imgB64);

  } catch(e) {
    console.error(e);
    showToast('❌ 분석 실패: ' + e.message);
    setChar('hum');
    setBubble('분석에 실패했어요 😅<br>URL을 확인해주세요');
  }

  document.getElementById('loading').classList.remove('on');
  document.getElementById('analyzeBtn').disabled = false;
}

function applyProduct(d, imgB64) {
  product = d; scripts = d.scripts;

  // AR 레이블
  document.getElementById('arStatus').textContent = d.category + ' · AI';
  document.getElementById('arProduct').textContent = d.productName;

  // 제품 존 표시
  const pz = document.getElementById('productZone');
  pz.classList.add('show');
  document.getElementById('idleHint').classList.add('gone');

  const wrap = document.getElementById('productImgWrap');
  if (imgB64) {
    wrap.innerHTML = `<img src="${imgB64}" alt="product">`;
  } else {
    wrap.innerHTML = `<div class="product-emoji-big">${d.emoji}</div>`;
  }
  document.getElementById('productLabelTag').textContent = d.productName;

  // 제품 카드
  const card = document.getElementById('productCard');
  card.classList.add('show');
  document.getElementById('pcEmoji').textContent = d.emoji;
  if (imgB64) {
    document.getElementById('pcThumb').innerHTML = `<img src="${imgB64}" alt="product">`;
  }
  document.getElementById('pcName').textContent = d.productName;
  document.getElementById('pcCat').textContent = d.category;
  document.getElementById('pcTags').innerHTML = (d.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('pcTagline').textContent = `"${d.tagline}"`;

  // 감정 & 스크립트 표시
  document.getElementById('stateSection').classList.add('show');
  document.getElementById('scriptSection').classList.add('show');

  const ICONS = {idle:'😊',happy:'🙌',speak:'📢',thinking:'🤔',hum:'💭'};
  document.getElementById('scriptList').innerHTML = d.scripts.map(s => `
    <div class="script-item" data-s="${s.state}" onclick="clickScriptItem('${s.state}',this)">
      <span class="si-icon">${ICONS[s.state]}</span>
      <span>${s.text}</span>
    </div>
  `).join('');

  // 첫 상태 = happy
  setChar('happy');
  const hs = scripts.find(s=>s.state==='happy');
  if (hs) setBubble(hs.text);

  showToast('✅ ' + d.productName + ' 분석 완료!');
  setTimeout(() => startAuto(), 1500);
}

async function regen() {
  if (!product || !API_KEY) return;
  document.querySelector('.regen-btn').textContent = '↻ 생성 중...';
  setChar('thinking');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-allow-browser':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:700,
        system:'AR 마케팅 전문가. JSON 배열만 응답.',
        messages:[{role:'user',content:`제품:${product.productName}, 카테고리:${product.category}
더 트렌디하고 재미있는 스크립트로 재생성. JSON 배열만:
[
  {"state":"idle","text":"25자이내"},
  {"state":"happy","text":"25자이내"},
  {"state":"speak","text":"25자이내"},
  {"state":"thinking","text":"25자이내"},
  {"state":"hum","text":"25자이내"}
]`}]
      })
    });
    const data = await res.json();
    const arr = JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    scripts = arr;
    const ICONS = {idle:'😊',happy:'🙌',speak:'📢',thinking:'🤔',hum:'💭'};
    document.getElementById('scriptList').innerHTML = arr.map(s=>`
      <div class="script-item" data-s="${s.state}" onclick="clickScriptItem('${s.state}',this)">
        <span class="si-icon">${ICONS[s.state]}</span><span>${s.text}</span>
      </div>`).join('');
    setChar('happy');
    setBubble(arr.find(s=>s.state==='happy')?.text||'');
    startAuto();
  } catch(e) { showToast('재생성 실패'); }
  document.querySelector('.regen-btn').textContent = '↺ 재생성';
}
</script>
